<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Homebrew Tracker{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        nav {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-bottom: 2px solid #f5a623;
        }

        nav .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5a623;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.95rem;
        }

        nav a:hover { color: #f5a623; }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #f5a623; }
        h2 { font-size: 1.3rem; margin-bottom: 1rem; }

        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #0f3460;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-planning    { background: #4a4a8a; color: #c0c0ff; }
        .badge-fermenting  { background: #1a5a1a; color: #80ff80; }
        .badge-conditioning{ background: #5a4a1a; color: #ffd080; }
        .badge-complete    { background: #2a2a2a; color: #aaaaaa; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }

        .btn-primary { background: #f5a623; color: #1a1a2e; font-weight: 600; }
        .btn-primary:hover { background: #e09510; }
        .btn-secondary { background: #0f3460; color: #e0e0e0; }
        .btn-secondary:hover { background: #1a4a80; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🍺 Homebrew Tracker</span>
        <a href="/">Dashboard</a>
        <a href="/recipes">Recipes</a>
        <a href="/sessions">Brew Sessions</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
