{% extends "base.html" %}

{% block title %}{{ title }} — Homebrew Tracker{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<div class="card">
    <form method="post" action="{{ action }}">

        <label style="display:block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem;">Recipe *
            <select name="recipe_id" required style="width:100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem; border: 1px solid #0f3460; border-radius: 4px; font-size: 1rem; box-sizing: border-box; background: #1a1a2e; color: #e0e0e0;">
                <option value="">— Select a recipe —</option>
                {% for recipe in recipes %}
                <option value="{{ recipe.id }}"
                    {% if run and run.recipe_id == recipe.id %}selected{% endif %}>
                    {{ recipe.name }}{% if recipe.spirit_type %} ({{ recipe.spirit_type }}){% endif %}
                </option>
                {% endfor %}
            </select>
        </label>

        <label style="display:block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem;">Batch Number *
            <input type="number" name="batch_number" required min="1"
                   value="{{ run.batch_number if run else '' }}"
                   style="width:100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem; border: 1px solid #0f3460; border-radius: 4px; font-size: 1rem; box-sizing: border-box; background: #1a1a2e; color: #e0e0e0;">
        </label>

        <label style="display:block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem;">Status
            <select name="status" style="width:100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem; border: 1px solid #0f3460; border-radius: 4px; font-size: 1rem; box-sizing: border-box; background: #1a1a2e; color: #e0e0e0;">
                {% for label, value in [
                    ("Planning", "planning"),
                    ("Fermenting", "fermenting"),
                    ("Stripping Run", "Stripping Run"),
                    ("Spirit Run", "Spirit Run"),
                ] %}
                <option value="{{ value }}"
                    {% if run and run.status == value %}selected{% endif %}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>
        </label>

        <label style="display:block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem;">Fermentation Start Date
            <input type="date" name="fermentation_start_date"
                   value="{{ run.fermentation_start_date.strftime('%Y-%m-%d') if run and run.fermentation_start_date else '' }}"
                   style="width:100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem; border: 1px solid #0f3460; border-radius: 4px; font-size: 1rem; box-sizing: border-box; background: #1a1a2e; color: #e0e0e0;">
        </label>

        <label style="display:block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem;">Actual OG <span style="font-size: 0.8rem; color: #aaa;">(e.g. 1.060)</span>
            <input type="number" name="actual_og" step="0.001" min="1.000" max="1.200"
                   value="{{ run.actual_og if run else '' }}"
                   style="width:100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem; border: 1px solid #0f3460; border-radius: 4px; font-size: 1rem; box-sizing: border-box; background: #1a1a2e; color: #e0e0e0;">
        </label>

        <label style="display:block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem;">Actual FG <span style="font-size: 0.8rem; color: #aaa;">(e.g. 1.010)</span>
            <input type="number" name="actual_fg" step="0.001" min="0.990" max="1.200"
                   value="{{ run.actual_fg if run else '' }}"
                   style="width:100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem; border: 1px solid #0f3460; border-radius: 4px; font-size: 1rem; box-sizing: border-box; background: #1a1a2e; color:
