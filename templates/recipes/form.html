<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} – Homebrew Tracker</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 1rem; font-weight: bold; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 0.4rem 0.6rem; margin-top: 0.25rem;
            border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 4px;
            font-size: 1rem; cursor: pointer; margin-top: 1.5rem; border: none; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #6b7280; color: white; margin-left: 0.5rem; }
        nav { margin-bottom: 1.5rem; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <nav><a href="/recipes">← Recipes</a></nav>
    <h1>{{ title }}</h1>

    <form method="post" action="{{ action }}">
        <label>Name *
            <input type="text" name="name" required
                   value="{{ recipe.name if recipe else '' }}">
        </label>

        <label>Spirit Type
            <select name="spirit_type">
                <option value="">— Select —</option>
                {% for st in ["Whisky", "Rum", "Vodka", "Gin", "Brandy", "Other"] %}
                <option value="{{ st }}"
                    {% if recipe and recipe.spirit_type == st %}selected{% endif %}>
                    {{ st }}
                </option>
                {% endfor %}
            </select>
        </label>

        <label>Mash Bill
            <textarea name="mash_bill">{{ recipe.mash_bill if recipe else '' }}</textarea>
        </label>

        <label>Target Wash OG (e.g. 1.060)
            <input type="number" name="target_wash_og" step="0.001" min="1.000" max="1.200"
                   value="{{ recipe.target_wash_og if recipe else '' }}">
        </label>

        <label>Target Wash ABV %
            <input type="number" name="target_wash_abv" step="0.1" min="0" max="20"
                   value="{{ recipe.target_wash_abv if recipe else '' }}">
        </label>

        <label>Water Volume (litres)
            <input type="number" name="water_volume_litres" step="0.5" min="0"
                   value="{{ recipe.water_volume_litres if recipe else '' }}">
        </label>

        <label>Yeast Strain
            <input type="text" name="yeast_strain"
                   value="{{ recipe.yeast_strain if recipe else '' }}">
        </label>

        <label>Notes
            <textarea name="notes">{{ recipe.notes if recipe else '' }}</textarea>
        </label>

        <button type="submit" class="btn btn-primary">Save Recipe</button>
        <a href="/recipes" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
